{% extends "base.html" %}

{% block content %}
<div style="text-align: center; max-width: 400px; margin: 0 auto;">
    <h2>Crie sua conta</h2>
    <p>Junte-se ao LabSpark para reservar laboratórios.</p>

    <form method="POST" action="{{ url_for('cadastro') }}">
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required placeholder="João da Silva">
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Cadastrar</button>
    </form>

    <p style="margin-top: 1.5rem; font-size: 0.9rem;">
        Já tem uma conta? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Faça Login</a>
    </p>
</div>
{% endblock %}
