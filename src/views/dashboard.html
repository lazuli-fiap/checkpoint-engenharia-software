{% extends "base.html" %}

{% block content %}
<div>
    <h2 style="text-align: center;">Laboratórios Disponíveis</h2>
    <p style="text-align: center;">Escolha um laboratório e faça sua reserva.</p>

    <!-- Formulário de Criação de Laboratório -->
    <div class="glass-card" style="margin-top: 2rem;">
        <h3>Cadastrar Novo Laboratório</h3>
        <form method="POST" action="{{ url_for('novo_laboratorio') }}" style="display: flex; gap: 1rem; align-items: flex-end;">
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label for="nome_lab">Nome do Laboratório</label>
                <input type="text" id="nome_lab" name="nome" required placeholder="Ex: Laboratório de Física">
            </div>
            <button type="submit" class="btn btn-primary">Adicionar</button>
        </form>
    </div>

    <!-- Lista de Laboratórios e Reserva -->
    <div class="glass-card" style="margin-top: 2rem;">
        <h3>Fazer Reserva</h3>
        {% if laboratorios %}
        <form method="POST" action="{{ url_for('reservar') }}">
            <div class="form-group">
                <label for="lab_id">Selecione o Laboratório</label>
                <select name="lab_id" id="lab_id" required>
                    <option value="" disabled selected>-- Escolha --</option>
                    {% for lab in laboratorios %}
                        <option value="{{ lab.id }}">{{ lab.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="data_hora">Data e Hora</label>
                <input type="datetime-local" id="data_hora" name="data_hora" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Confirmar Reserva</button>
        </form>
        {% else %}
        <p>Não há laboratórios cadastrados no momento.</p>
        {% endif %}
    </div>

</div>
{% endblock %}
